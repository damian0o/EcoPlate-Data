name: Convert XLSX to JSON

on:
  push:
    branches: [main]
    paths: ['*.xlsx']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python convert.py

      - name: Deploy to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan data-temp
          git rm -rf .
          mv *.json . 2>/dev/null || true
          git add *.json
          git commit -m "Auto-convert xlsx to json"
          git branch -D data 2>/dev/null || true
          git branch -m data
          git push origin data --force
